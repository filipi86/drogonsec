version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - misspell
  disable:
    - errcheck   # viper.BindPFlag / progress bar errors are non-critical
  settings:
    govet:
      enable-all: false
    staticcheck:
      checks: ["all", "-SA1006", "-SA1019"]

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
