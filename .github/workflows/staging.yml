name: Staging Pipeline

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

permissions:
  contents: read
  security-events: write

jobs:
  # ============ BUILD & TEST ============
  build-test:
    name: Build & Test (Staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Build binary (staging branding)
        run: |
          go build \
            -ldflags "-X github.com/filipi86/drogonsec/internal/cli.Environment=staging" \
            -o bin/drogonsec-staging \
            ./cmd/drogonsec

  # ============ LINT ============
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.0.0

  # ============ DOCKER ============
  docker:
    name: Build Docker (Staging)
    runs-on: ubuntu-latest
    needs: [ build-test ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (staging tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            ENVIRONMENT=staging
          tags: |
            ghcr.io/${{ github.repository }}:staging
            ghcr.io/${{ github.repository }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
